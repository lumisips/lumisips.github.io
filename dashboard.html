<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LumiSips Founder Dashboard</title>
<link rel="stylesheet" href="dashboard.css?v=3">
</head>

<body>
<header>LumiSips Founder Dashboard</header>

<main class="container">
  <section class="grid">
    <div class="card">
      <h2>Members</h2>
      <div id="members" class="stat">0</div>
    </div>

    <div class="card">
      <h2>Votes</h2>
      <div id="votes">Loading...</div>
    </div>
  </section>

  <section class="card">
    <h2>Flavor Suggestions</h2>
    <div id="suggestions">Loading...</div>
  </section>

  <section class="card">
    <h2>Waitlist</h2>
    <div id="waitlist">Loading...</div>
  </section>

  <section class="card">
    <h2>Messages</h2>
    <div id="messages">Loading...</div>
  </section>

  <section class="card">
    <h2>Notifications</h2>
    <div id="notifications">Loading...</div>
  </section>
</main>

<script type="module" src="dashboard.js?v=3"></script>
</body>
</html>
