<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>LumiSips Founder Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<header>
LumiSips Founder Dashboard
</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>Members</h2>
<div id="members" class="stat">0</div>
</div>

<div class="card">
<h2>Votes</h2>
<div id="votes"></div>
</div>

</div>

<div class="card">
<h2>Flavor Suggestions</h2>
<div id="suggestions"></div>
</div>

<div class="card">
<h2>Waitlist</h2>
<div id="waitlist"></div>
</div>

<div class="card">
<h2>Messages</h2>
<div id="messages"></div>
</div>

<div class="card">
<h2>Notifications</h2>
<div id="notifications"></div>
</div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
